version: 2

models:
  - name: stg_regional_targets
    description: "Staging model for regional sales targets."
    columns:
      - name: target_id
        description: "Primary key for the target record, generated from location_id and target_month."
        tests:
          - unique
          - not_null
      - name: location_id
        description: "The unique identifier for the store location."
      - name: target_month
        description: "The first day of the month for the target."
      - name: monthly_revenue_target
        description: "The revenue target for the location for the given month."
